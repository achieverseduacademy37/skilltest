<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — SkillTest Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d4a;
  --accent:#3b82f6;--accent2:#06b6d4;--gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#f0f4ff;--muted:#8fa3c3;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* NAV */
nav{padding:0 5%;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav-logo-mark svg{width:18px;height:18px;fill:#fff;}
.nav-brand{font-family:var(--font-display);font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-back{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted);padding:7px 14px;border:1px solid var(--border);border-radius:8px;transition:.2s;}
.nav-back:hover{color:var(--text);border-color:var(--accent);}

/* HEADER */
.lb-header{padding:48px 5% 32px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);}
.lb-header-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px;}
.lb-header h1{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:800;margin-bottom:10px;}
.lb-header p{font-size:15px;color:var(--muted);}

/* PODIUM */
.podium-wrap{max-width:560px;margin:0 auto;padding:40px 20px 20px;display:flex;align-items:flex-end;justify-content:center;gap:12px;}
.podium-item{flex:1;max-width:140px;text-align:center;}
.podium-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin:0 auto 8px;border:3px solid transparent;}
.podium-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.podium-score{font-family:var(--font-display);font-size:16px;font-weight:800;}
.podium-block{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:800;margin-top:8px;}
.podium-item.rank1 .podium-avatar{border-color:var(--gold);background:rgba(245,158,11,.15);color:var(--gold);}
.podium-item.rank1 .podium-score{color:var(--gold);}
.podium-item.rank1 .podium-block{height:90px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--gold);}
.podium-item.rank2 .podium-avatar{border-color:#94a3b8;background:rgba(148,163,184,.1);color:#94a3b8;}
.podium-item.rank2 .podium-score{color:#94a3b8;}
.podium-item.rank2 .podium-block{height:65px;background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:#94a3b8;}
.podium-item.rank3 .podium-avatar{border-color:#cd7c3a;background:rgba(205,124,58,.1);color:#cd7c3a;}
.podium-item.rank3 .podium-score{color:#cd7c3a;}
.podium-item.rank3 .podium-block{height:48px;background:rgba(205,124,58,.08);border:1px solid rgba(205,124,58,.2);color:#cd7c3a;}

/* MAIN CONTENT */
.lb-main{max-width:820px;margin:0 auto;padding:32px 20px;}

/* CONTROLS */
.lb-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
.lb-search{flex:1;min-width:200px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13.5px;color:var(--text);font-family:var(--font-body);outline:none;transition:.2s;}
.lb-search:focus{border-color:var(--accent);}
.lb-search::placeholder{color:var(--muted);}
.lb-filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.lb-filter{padding:9px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;}
.lb-filter:hover{color:var(--text);}
.lb-filter.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* STATS ROW */
.lb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.lb-stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.lb-stat-box .n{font-family:var(--font-display);font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lb-stat-box .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}

/* TABLE */
.lb-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.lb-table-head{display:grid;grid-template-columns:44px 1fr 90px 80px 80px 70px;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);}
.lb-table-body{}
.lb-entry{display:grid;grid-template-columns:44px 1fr 90px 80px 80px 70px;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);align-items:center;transition:.15s;}
.lb-entry:last-child{border-bottom:none;}
.lb-entry:hover{background:var(--surface2);}
.lb-entry.highlight{background:rgba(59,130,246,.06);border-left:3px solid var(--accent);}
.rank-cell{font-family:var(--font-display);font-size:15px;font-weight:800;text-align:center;}
.rank-cell.g{color:var(--gold);}
.rank-cell.s{color:#94a3b8;}
.rank-cell.b{color:#cd7c3a;}
.rank-cell.r{color:var(--muted);}
.name-cell{display:flex;align-items:center;gap:10px;}
.name-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.name-info .primary{font-size:14px;font-weight:600;}
.name-info .secondary{font-size:11.5px;color:var(--muted);margin-top:1px;}
.score-cell{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--accent2);}
.acc-cell{font-size:13px;font-weight:600;}
.time-cell{font-size:12.5px;color:var(--muted);}
.date-cell{font-size:11.5px;color:var(--muted);}

.lb-empty-msg{text-align:center;padding:60px 20px;color:var(--muted);}
.lb-empty-msg .icon{font-size:40px;margin-bottom:12px;}
.lb-empty-msg p{font-size:14px;}

.lb-loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

.pagination{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.page-btn{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;}
.page-btn:hover{color:var(--text);}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

@media(max-width:600px){
  .lb-stats{grid-template-columns:1fr 1fr;}
  .lb-table-head{grid-template-columns:36px 1fr 72px 60px;}
  .lb-entry{grid-template-columns:36px 1fr 72px 60px;}
  .acc-cell,.time-cell{display:none;}
  .podium-wrap{gap:6px;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="nav-brand">SkillTest Pro</span>
  </a>
  <a class="nav-back" href="index.html">← Back to Tests</a>
</nav>

<div class="lb-header">
  <div class="lb-header-label">Rankings</div>
  <h1>🏆 Leaderboard</h1>
  <p>Live rankings across all tests — updated after every submission</p>
</div>

<div id="podiumWrap" class="podium-wrap" style="display:none;"></div>

<div class="lb-main">
  <div class="lb-stats" id="lbStats">
    <div class="lb-stat-box"><div class="n" id="statTotal">—</div><div class="l">Total Attempts</div></div>
    <div class="lb-stat-box"><div class="n" id="statAvg">—</div><div class="l">Avg Score</div></div>
    <div class="lb-stat-box"><div class="n" id="statTop">—</div><div class="l">Top Score</div></div>
    <div class="lb-stat-box"><div class="n" id="statTests">—</div><div class="l">Tests Active</div></div>
  </div>

  <div class="lb-controls">
    <input class="lb-search" type="text" id="searchInput" placeholder="🔍  Search by name or mobile..."/>
    <div class="lb-filter-group" id="filterGroup">
      <div class="lb-filter active" data-test="All">All Tests</div>
    </div>
  </div>

  <div class="lb-table-wrap">
    <div class="lb-table-head">
      <div>#</div>
      <div>Student</div>
      <div>Score</div>
      <div>Accuracy</div>
      <div>Time</div>
      <div>Date</div>
    </div>
    <div class="lb-table-body" id="lbBody">
      <div class="lb-loading">Loading leaderboard data...</div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script src="js/sheets.js"></script>
<script>
let allData = [];
let filtered = [];
let activeTest = 'All';
let searchQuery = '';
let currentPage = 1;
const PER_PAGE = 20;

const avatarColors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6'];
function getColor(name){ let h=0;for(let c of name)h+=c.charCodeAt(0);return avatarColors[h%avatarColors.length]; }
function initials(name){ return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2)||'?'; }
function rankClass(i){ return ['g','s','b'][i]||'r'; }
function rankLabel(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1); }

async function loadData(){
  allData = await SheetsAPI.getLeaderboard();
  if(allData.length===0){
    document.getElementById('lbBody').innerHTML=`
      <div class="lb-empty-msg">
        <div class="icon">📋</div>
        <p>No attempts yet! Take a test to appear on the leaderboard.</p>
        <br/><a href="index.html" style="color:var(--accent);font-weight:600;">Browse Tests →</a>
      </div>`;
    return;
  }
  buildFilters();
  updateStats();
  applyFilters();
  buildPodium();
}

function buildFilters(){
  const tests = ['All',...new Set(allData.map(r=>r.testName))];
  const fg = document.getElementById('filterGroup');
  fg.innerHTML='';
  tests.forEach(t=>{
    const d=document.createElement('div');
    d.className='lb-filter'+(t==='All'?' active':'');
    d.dataset.test=t;
    d.textContent=t==='All'?'All Tests':t;
    d.onclick=()=>{ activeTest=t; document.querySelectorAll('.lb-filter').forEach(f=>f.classList.remove('active')); d.classList.add('active'); currentPage=1; applyFilters(); buildPodium(); };
    fg.appendChild(d);
  });
}

function updateStats(){
  const scores = allData.map(r=>r.score);
  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statAvg').textContent = allData.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  document.getElementById('statTop').textContent = allData.length ? Math.max(...scores) : '—';
  document.getElementById('statTests').textContent = new Set(allData.map(r=>r.testName)).size;
}

function applyFilters(){
  filtered = allData.filter(r=>{
    const testMatch = activeTest==='All' || r.testName===activeTest;
    const q = searchQuery.toLowerCase();
    const nameMatch = !q || r.name.toLowerCase().includes(q) || r.mobile.includes(q);
    return testMatch && nameMatch;
  }).sort((a,b)=>b.score-a.score || a.wrong-b.wrong);
  renderTable();
  renderPagination();
}

function renderTable(){
  const body = document.getElementById('lbBody');
  if(filtered.length===0){ body.innerHTML=`<div class="lb-empty-msg"><div class="icon">🔍</div><p>No results found.</p></div>`; return; }
  const start=(currentPage-1)*PER_PAGE;
  const page=filtered.slice(start,start+PER_PAGE);
  body.innerHTML='';
  page.forEach((r,idx)=>{
    const globalRank=start+idx;
    const color=getColor(r.name);
    const div=document.createElement('div');
    div.className='lb-entry'+(globalRank<3?' highlight':'');
    div.innerHTML=`
      <div class="rank-cell ${rankClass(globalRank)}">${rankLabel(globalRank)}</div>
      <div class="name-cell">
        <div class="name-avatar" style="background:${color}22;color:${color}">${initials(r.name)}</div>
        <div class="name-info">
          <div class="primary">${r.name}</div>
          <div class="secondary">${r.testName} • ${r.mobile.replace(/(\d{6})(\d{4})/,'******$2')}</div>
        </div>
      </div>
      <div class="score-cell">${r.score}<span style="font-size:12px;color:var(--muted);font-family:var(--font-body)">/${r.maxScore}</span></div>
      <div class="acc-cell" style="color:${r.accuracy>=70?'var(--green)':r.accuracy>=50?'var(--gold)':'var(--red)'}">${r.accuracy}%</div>
      <div class="time-cell">${r.timeTaken}</div>
      <div class="date-cell">${r.date.split(',')[0]||r.date.substring(0,10)}</div>`;
    body.appendChild(div);
  });
}

function renderPagination(){
  const total=Math.ceil(filtered.length/PER_PAGE);
  const pg=document.getElementById('pagination');
  if(total<=1){pg.innerHTML='';return;}
  pg.innerHTML='';
  for(let i=1;i<=total;i++){
    const b=document.createElement('div');
    b.className='page-btn'+(i===currentPage?' active':'');
    b.textContent=i;
    b.onclick=()=>{currentPage=i;applyFilters();window.scrollTo({top:400,behavior:'smooth'});};
    pg.appendChild(b);
  }
}

function buildPodium(){
  const src = activeTest==='All'?allData:allData.filter(r=>r.testName===activeTest);
  const top = src.sort((a,b)=>b.score-a.score).slice(0,3);
  const wrap = document.getElementById('podiumWrap');
  if(top.length<1){wrap.style.display='none';return;}
  wrap.style.display='flex';
  // order: 2nd, 1st, 3rd
  const order=[top[1],top[0],top[2]].filter(Boolean);
  const rankClasses=['rank2','rank1','rank3'];
  const actualRanks=[2,1,3];
  wrap.innerHTML='';
  order.forEach((r,i)=>{
    const ri=r===top[0]?0:r===top[1]?1:2;
    const div=document.createElement('div');
    div.className=`podium-item rank${ri+1}`;
    div.innerHTML=`
      <div class="podium-avatar">${initials(r.name)}</div>
      <div class="podium-name">${r.name.split(' ')[0]}</div>
      <div class="podium-score">${r.score}</div>
      <div class="podium-block">${['🥇','🥈','🥉'][ri]}</div>`;
    wrap.appendChild(div);
  });
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;currentPage=1;applyFilters();
});

loadData();
</script>
</body>
</html>
